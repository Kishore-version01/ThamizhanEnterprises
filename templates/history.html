<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Canvas Background */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom,
                    #1e1b4b 0%,
                    #0f172a 50%,
                    #020617 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            background: transparent;
        }

        /* Hide vertical scrollbar but allow scroll */
        body::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            /* IE & Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* NAVBAR */

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            /* semi transparent */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            /* Safari support */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links li a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            font-size: 15px;
            transition: 0.3s ease;
            position: relative;
        }

        /* Hover underline animation */
        .nav-links li a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #3b82f6;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .nav-links li a:hover::after {
            width: 100%;
        }

        /* Push content below fixed navbar */
        .main-content {
            margin-top: 90px;
        }

        /* HAMBURGER MENU */

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .menu-toggle span {
            width: 28px;
            height: 3px;
            background: white;
            border-radius: 5px;
            transition: 0.4s;
        }

        /* Hamburger → X animation */

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }

        /* MOBILE NAVBAR */

        @media (max-width:768px) {

            .menu-toggle {
                display: flex;
            }

            .nav-links li a {
                display: block;
                padding: 10px 20px;
                border-radius: 8px;
                transition: 0.3s;
            }

            /* Highlight on hover / tap */
            .nav-links li a:hover {
                background: rgba(59, 130, 246, 0.2);
                color: #60a5fa;
                box-shadow:
                    0 0 10px rgba(59, 130, 246, 0.6),
                    0 0 20px rgba(59, 130, 246, 0.4);
            }

            .nav-links {

                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;

                flex-direction: column;
                align-items: center;
                gap: 25px;

                background: rgba(15, 23, 42, 0.6);
                backdrop-filter: blur(15px);

                border-top: none;
                max-height: 0;
                overflow: hidden;

                transition: max-height 0.5s ease;
            }

            .nav-links.active {
                max-height: 600px;
                padding: 30px 0;
            }

            .nav-links {
                overflow-y: auto;
            }

        }

        @media (max-width:768px) {

            .nav-links li {
                width: 100%;
                text-align: center;
            }

        }

        .nav-links li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            position: relative;
            transition: 0.3s;
        }

        .nav-links li a:hover {
            color: #60a5fa;
            text-shadow:
                0 0 5px #3b82f6,
                0 0 10px #3b82f6,
                0 0 20px #3b82f6;
        }

        /* Page Content Styling */
        .main-content {
            margin-top: 90px;
            padding: 50px 20px 60px;
            min-height: 100vh;
        }

        h2 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 40px;
            color: white;
            font-weight: 700;
        }

        .table-container {
            max-width: 1200px;
            margin: 0 auto 40px;
            overflow-x: auto;
            border-radius: 10px;
            background: rgba(30, 27, 75, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }

        table thead {
            background: rgba(15, 23, 42, 0.8);
        }

        table th {
            padding: 16px 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: #60a5fa;
            white-space: nowrap;
        }

        table td {
            padding: 14px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            vertical-align: middle;
        }

        table tbody tr {
            transition: 0.3s ease;
        }

        table tbody tr:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        table tbody tr:nth-child(even) {
            background: rgba(139, 92, 246, 0.05);
        }

        /* Search Section */
        .search-section {
            max-width: 1200px;
            margin: 0 auto 35px;
            padding: 0 20px;
        }

        .search-card {
            background: rgba(30, 27, 75, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 28px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .search-card h3 {
            font-size: 18px;
            margin-bottom: 18px;
            color: #60a5fa;
            font-weight: 600;
        }

        .search-form {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .date-input {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            background: rgba(15, 23, 42, 0.7);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .date-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            outline: none;
        }

        .date-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .clear-search-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ef4444, #f87171);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .clear-search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .search-result {
            margin-top: 14px;
            font-size: 14px;
            color: #c4b5fd;
            min-height: 20px;
            text-align: center;
        }

        .search-result.success {
            color: #86efac;
        }

        .search-result.error {
            color: #fca5a5;
        }

        /* Back to Delay Entry Button */
        .back-to-delay-container {
            max-width: 1200px;
            margin: 50px auto 0;
            padding: 0 20px 40px;
            text-align: center;
        }

        .back-to-delay-btn {
            display: inline-block;
            padding: 13px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            transition: 0.3s ease;
            font-size: 15px;
        }

        .back-to-delay-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.8);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 35px 15px 50px;
            }

            h2 {
                font-size: 28px;
                margin-bottom: 30px;
                margin-top: 15px;
            }

            .search-section {
                margin-bottom: 25px;
                padding: 0 15px;
            }

            .search-card {
                padding: 20px;
            }

            .search-card h3 {
                font-size: 16px;
                margin-bottom: 14px;
            }

            .search-form {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }

            .date-input,
            .search-btn,
            .clear-search-btn {
                width: 100%;
                min-width: auto;
            }

            .table-container {
                padding: 16px;
                margin-bottom: 30px;
            }

            table th {
                padding: 12px 8px;
                font-size: 12px;
            }

            table td {
                padding: 10px 8px;
                font-size: 12px;
            }

            .back-to-delay-container {
                margin-top: 30px;
                padding: 0 15px 30px;
            }

            .back-to-delay-btn {
                padding: 11px 24px;
                font-size: 14px;
                width: 100%;
                display: block;
            }

            .navbar-inner {
                padding: 15px;
            }

            .nav-links {
                gap: 15px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 25px 12px 40px;
            }

            h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .search-section {
                margin-bottom: 20px;
                padding: 0 10px;
            }

            .search-card {
                padding: 16px;
            }

            .search-form {
                gap: 8px;
            }

            .date-input {
                min-width: 100%;
            }

            .search-btn,
            .clear-search-btn {
                font-size: 13px;
                padding: 10px 16px;
            }

            table {
                font-size: 11px;
            }

            table th {
                padding: 10px 6px;
            }

            table td {
                padding: 8px 6px;
            }

            .back-to-delay-container {
                margin-top: 20px;
                padding: 0 12px 25px;
            }

            .back-to-delay-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">

            <div class="logo">Thamizhan Enterprises</div>

            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Login</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="dataentry.html">Data Entry</a></li>
                <li><a href="progress.html">Progress</a></li>
                <li><a href="log.html">Log</a></li>
                <li><a href="aboutus.html">About Us</a></li>
            </ul>

        </div>
    </nav>

    <div class="main-content">
        <h2>📋 Delay History</h2>

        <div class="search-section">
            <div class="search-card">
                <h3>Search by Date</h3>
                <div class="search-form">
                    <input type="date" id="searchDate" class="date-input">
                    <button id="searchBtn" class="search-btn">🔍 Search</button>
                    <button id="clearSearchBtn" class="clear-search-btn">Clear</button>
                </div>
                <p id="searchResult" class="search-result"></p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Train</th>
                        <th>Date</th>
                        <th>Station</th>
                        <th>Stop Seq</th>
                        <th>Sch Arr</th>
                        <th>Sch Dep</th>
                        <th>Act Arr</th>
                        <th>Act Dep</th>
                        <th>Weather</th>
                        <th>Holiday</th>
                        <th>Peak Hr</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>

        <div class="back-to-delay-container">
            <a href="delay.html" class="back-to-delay-btn">← Back to Delay Entry</a>
        </div>
    </div>

    <canvas id="starCanvas"></canvas>
    <script>

        // Fetch history from localStorage
        const fullHistory = JSON.parse(localStorage.getItem("trainHistory")) || [];
        let currentHistory = [...fullHistory];

        const table = document.getElementById("historyTable");
        const searchDateInput = document.getElementById("searchDate");
        const searchBtn = document.getElementById("searchBtn");
        const clearSearchBtn = document.getElementById("clearSearchBtn");
        const searchResultMsg = document.getElementById("searchResult");

        // Function to display history in table
        function displayHistory(dataToDisplay) {
            table.innerHTML = "";

            if (dataToDisplay.length === 0) {
                const emptyRow = document.createElement("tr");
                emptyRow.innerHTML = '<td colspan="11" style="text-align: center; color: #d1d5db; padding: 20px;">No records found</td>';
                table.appendChild(emptyRow);
                return;
            }

            dataToDisplay.forEach(data => {
                const row = document.createElement("tr");
                row.innerHTML = `
<td>${data.train || "N/A"}</td>
<td>${data.dateOfTravel || "N/A"}</td>
<td>${data.station || "N/A"}</td>
<td>${data.seq || "N/A"}</td>
<td>${data.schArr || "N/A"}</td>
<td>${data.schDep || "N/A"}</td>
<td>${data.actArr || "N/A"}</td>
<td>${data.actDep || "N/A"}</td>
<td>${data.weather || "N/A"}</td>
<td>${data.holiday || "N/A"}</td>
<td>${data.peakHr || "N/A"}</td>
`;
                table.appendChild(row);
            });
        }

        // Initial display of all history
        displayHistory(currentHistory);

        // Search functionality
        searchBtn.addEventListener("click", function () {
            const selectedDate = searchDateInput.value;

            if (!selectedDate) {
                searchResultMsg.textContent = "⚠️ Please select a date to search";
                searchResultMsg.className = "search-result error";
                return;
            }

            // Filter history by date
            const filteredHistory = fullHistory.filter(data => {
                return data.dateOfTravel === selectedDate;
            });

            currentHistory = filteredHistory;
            displayHistory(currentHistory);

            if (filteredHistory.length === 0) {
                searchResultMsg.textContent = `❌ No records found for ${selectedDate}`;
                searchResultMsg.className = "search-result error";
            } else {
                searchResultMsg.textContent = `✅ Found ${filteredHistory.length} record(s) for ${selectedDate}`;
                searchResultMsg.className = "search-result success";
            }
        });

        // Clear search functionality
        clearSearchBtn.addEventListener("click", function () {
            searchDateInput.value = "";
            currentHistory = [...fullHistory];
            displayHistory(currentHistory);
            searchResultMsg.textContent = "";
            searchResultMsg.className = "search-result";
        });

        // Allow searching by pressing Enter key
        searchDateInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                searchBtn.click();
            }
        });

        // Canvas Star Background Animation
        const canvas = document.getElementById("starCanvas");
        const ctx = canvas ? canvas.getContext("2d") : null;

        if (canvas && ctx) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let stars = [];
            let shootingStar = null;

            class Star {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.radius = Math.random() * 1.5;
                    this.speed = Math.random() * 0.5 + 0.2;
                    this.alpha = Math.random();
                    this.alphaChange = Math.random() * 0.02 + 0.005;
                }

                update() {
                    this.y += this.speed;

                    if (this.y > canvas.height) {
                        this.y = 0;
                        this.x = Math.random() * canvas.width;
                    }

                    this.alpha += this.alphaChange;
                    if (this.alpha <= 0 || this.alpha >= 1) {
                        this.alphaChange = -this.alphaChange;
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
                    ctx.fill();
                }
            }

            class ShootingStar {
                constructor() {
                    const side = Math.floor(Math.random() * 2);

                    if (side === 0) {
                        this.x = Math.random() * canvas.width;
                        this.y = 0;
                    } else {
                        this.x = 0;
                        this.y = Math.random() * canvas.height;
                    }

                    this.length = Math.random() * 120 + 80;
                    this.speed = Math.random() * 6 + 6;
                    this.angle = Math.PI / 4;
                    this.active = true;
                }

                update() {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;

                    if (this.x > canvas.width || this.y > canvas.height) {
                        this.active = false;
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(
                        this.x - Math.cos(this.angle) * this.length,
                        this.y - Math.sin(this.angle) * this.length
                    );

                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "white";
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            function init() {
                stars = [];
                for (let i = 0; i < 300; i++) {
                    stars.push(new Star());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                stars.forEach(star => {
                    star.update();
                    star.draw();
                });

                if (shootingStar) {
                    shootingStar.update();
                    shootingStar.draw();
                    if (!shootingStar.active) shootingStar = null;
                }

                requestAnimationFrame(animate);
            }

            init();
            animate();

            function randomShootingStar() {
                shootingStar = new ShootingStar();
                const nextTime = Math.random() * 4000 + 4000; // 4–8 sec
                setTimeout(randomShootingStar, nextTime);
            }

            randomShootingStar();

            window.addEventListener("resize", () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                init();
            });
        }

        // Hamburger Menu Toggle
        const menuToggle = document.getElementById("menuToggle");
        const navLinks = document.getElementById("navLinks");

        menuToggle.addEventListener("click", () => {
            menuToggle.classList.toggle("active");
            navLinks.classList.toggle("active");
        });

    </script>
</body>
</html>
